<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 128" width="256" height="128">
  <defs>
    <radialGradient id="weakPointGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8a0" stop-opacity="1"/>
      <stop offset="50%" stop-color="#ffce3a" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ff6a1a" stop-opacity="0.0"/>
    </radialGradient>
    <linearGradient id="hullGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a2238"/>
      <stop offset="50%" stop-color="#3a0e1f"/>
      <stop offset="100%" stop-color="#1a050d"/>
    </linearGradient>
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#74264a"/>
      <stop offset="100%" stop-color="#2a0816"/>
    </linearGradient>
    <linearGradient id="cannonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c2b5a0"/>
      <stop offset="100%" stop-color="#4a3a2e"/>
    </linearGradient>
  </defs>

  <!-- Outer aura -->
  <ellipse cx="128" cy="64" rx="124" ry="56" fill="#2a0a18" opacity="0.55"/>
  <ellipse cx="128" cy="64" rx="110" ry="44" fill="#1a050d" opacity="0.7"/>

  <!-- Left wing -->
  <path d="M 70 64 L 18 40 L 8 60 L 22 78 L 70 78 Z"
        fill="url(#wingGrad)" stroke="#8a3a5a" stroke-width="1.5"/>
  <!-- Left wing armor rivets -->
  <circle cx="32" cy="58" r="2" fill="#ff5577"/>
  <circle cx="50" cy="70" r="2" fill="#ff5577"/>
  <circle cx="42" cy="50" r="1.5" fill="#ff8866"/>
  <circle cx="58" cy="76" r="1.5" fill="#ff8866"/>

  <!-- Right wing -->
  <path d="M 186 64 L 238 40 L 248 60 L 234 78 L 186 78 Z"
        fill="url(#wingGrad)" stroke="#8a3a5a" stroke-width="1.5"/>
  <circle cx="224" cy="58" r="2" fill="#ff5577"/>
  <circle cx="206" cy="70" r="2" fill="#ff5577"/>
  <circle cx="214" cy="50" r="1.5" fill="#ff8866"/>
  <circle cx="198" cy="76" r="1.5" fill="#ff8866"/>

  <!-- Wing cannon pods -->
  <rect x="14" y="60" width="14" height="6" rx="2" fill="url(#cannonGrad)" stroke="#222" stroke-width="0.5"/>
  <rect x="228" y="60" width="14" height="6" rx="2" fill="url(#cannonGrad)" stroke="#222" stroke-width="0.5"/>
  <rect x="10" y="61" width="4" height="4" fill="#ff3344"/>
  <rect x="242" y="61" width="4" height="4" fill="#ff3344"/>

  <!-- Main hull -->
  <path d="M 70 50
           Q 90 30 128 30
           Q 166 30 186 50
           L 186 78
           Q 166 96 128 96
           Q 90 96 70 78 Z"
        fill="url(#hullGrad)" stroke="#8a3a5a" stroke-width="1.5"/>

  <!-- Hull armor plating lines -->
  <path d="M 80 50 L 80 78 M 176 50 L 176 78" stroke="#5a2238" stroke-width="1"/>
  <path d="M 100 38 L 100 90 M 156 38 L 156 90" stroke="#5a2238" stroke-width="0.5" opacity="0.7"/>
  <path d="M 128 32 L 128 94" stroke="#5a2238" stroke-width="0.5" opacity="0.5"/>

  <!-- Hull ridge / spine -->
  <path d="M 70 64 Q 100 56 128 58 Q 156 56 186 64 Q 156 72 128 70 Q 100 72 70 64 Z"
        fill="#4a1a2a" stroke="#7a2840" stroke-width="0.5"/>

  <!-- Cockpit windows -->
  <ellipse cx="100" cy="64" rx="6" ry="4" fill="#1a0a14" stroke="#8a3a5a"/>
  <ellipse cx="100" cy="64" rx="4" ry="2.5" fill="#4dd6ff" opacity="0.85"/>
  <ellipse cx="156" cy="64" rx="6" ry="4" fill="#1a0a14" stroke="#8a3a5a"/>
  <ellipse cx="156" cy="64" rx="4" ry="2.5" fill="#4dd6ff" opacity="0.85"/>

  <!-- Nose cannons -->
  <rect x="124" y="26" width="3" height="8" fill="#444"/>
  <rect x="129" y="26" width="3" height="8" fill="#444"/>
  <circle cx="125.5" cy="26" r="1.5" fill="#ff3344"/>
  <circle cx="130.5" cy="26" r="1.5" fill="#ff3344"/>

  <!-- Engine pods (rear) -->
  <rect x="76" y="78" width="10" height="14" rx="2" fill="#1a0a14" stroke="#5a2238"/>
  <rect x="170" y="78" width="10" height="14" rx="2" fill="#1a0a14" stroke="#5a2238"/>
  <ellipse cx="81" cy="93" rx="4" ry="3" fill="#4dd6ff" opacity="0.9"/>
  <ellipse cx="175" cy="93" rx="4" ry="3" fill="#4dd6ff" opacity="0.9"/>
  <ellipse cx="81" cy="93" rx="2" ry="1.5" fill="#ffffff"/>
  <ellipse cx="175" cy="93" rx="2" ry="1.5" fill="#ffffff"/>

  <!-- Hull edge highlights -->
  <path d="M 70 50 Q 90 32 128 30 Q 166 32 186 50"
        fill="none" stroke="#a04a6a" stroke-width="1" opacity="0.6"/>

  <!-- Weak point glow halo (large soft) -->
  <circle cx="128" cy="64" r="20" fill="url(#weakPointGlow)" opacity="0.85"/>
  <!-- Weak point core -->
  <circle cx="128" cy="64" r="9" fill="#1a050d" stroke="#ffce3a" stroke-width="2"/>
  <circle cx="128" cy="64" r="5" fill="#fff8a0"/>
  <circle cx="128" cy="64" r="2.5" fill="#ffffff"/>

  <!-- Threat warning chevrons -->
  <path d="M 60 86 L 64 90 L 60 94 L 58 92 L 60 90 L 58 88 Z" fill="#ffce3a"/>
  <path d="M 196 86 L 192 90 L 196 94 L 198 92 L 196 90 L 198 88 Z" fill="#ffce3a"/>
</svg>
